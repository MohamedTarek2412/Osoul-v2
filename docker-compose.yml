services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - '8080:80'
    restart: unless-stopped

  dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    ports:
      - '5173:5173'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
